<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Achievements</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0a0e27;
  /* Changed card to a glass effect to match dashboard */
  --card: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.15);
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.3);
  --muted: #94a3b8;
  --radius: 12px;
  --text-main: #f8fafc;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: var(--bg);
  color: var(--text-main);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Starfield Background Layer */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 60px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 150px 150px, #ddd, rgba(0,0,0,0));
  background-repeat: repeat;
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

body > * { position: relative; z-index: 2; }

/* ===== NAVIGATION ===== */
.topbar {
  height: 70px;
  display: flex;
  align-items: center;
  padding: 0 30px;
  gap: 12px;
  background: rgba(10, 14, 39, 0.8);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(15px);
}

.back-btn {
  display: inline-block;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--glass-border);
  transition: all 0.3s ease;
  font-size: 14px;
}

.back-btn:hover {
  background: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
  transform: translateX(-3px);
}

.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
}

/* ===== CARDS (GLASSMORPISM) ===== */
.card {
  background: var(--card);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: var(--radius);
  margin-bottom: 30px;
  border: 1px solid var(--glass-border);
  animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

h2 {
  margin-top: 0;
  margin-bottom: 25px;
  color: #fff;
  font-size: 24px;
}

/* ===== FORM ELEMENTS ===== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-weight: 600;
  color: #e2e8f0;
  margin-bottom: 8px;
  font-size: 14px;
}

input, select, textarea {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
  font-size: 14px;
  width: 100%;
  background: rgba(0, 0, 0, 0.2);
  color: #fff;
  font-family: inherit;
  transition: all 0.3s ease;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(0, 0, 0, 0.4);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Make calendar icon visible on dark background */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

/* ===== DATE ROW ===== */
.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ===== PRIMARY SAVE BUTTON ===== */
button:not(.delete-btn):not(.back-btn) {
  margin-top: 10px;
  padding: 12px 30px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  width: fit-content;
  transition: all 0.3s ease;
}

button:not(.delete-btn):not(.back-btn):hover {
  background: #4f46e5;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-2px);
}

/* ===== ACHIEVEMENT LIST ITEM ===== */
.achievement {
  border-left: 4px solid var(--accent);
  background: rgba(255, 255, 255, 0.02);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 0 10px 10px 0;
  transition: 0.3s;
}

.achievement:hover {
  background: rgba(255, 255, 255, 0.05);
}

.achievement h4 {
  margin: 0 0 6px 0;
  color: #fff;
  font-size: 18px;
}

.muted {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 4px;
}

/* ===== DELETE BUTTON ===== */
.delete-btn {
  background: rgba(239, 68, 68, 0.1);
  color: #f87171;
  border: 1px solid rgba(239, 68, 68, 0.2);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.delete-btn:hover {
  background: #dc2626;
  color: white;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .date-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <button class="back-btn" onclick="history.back()">← Back to Dashboard</button>

  <div class="card">
    <h2>Add Achievement</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Title</label>
        <input id="title" placeholder="Hackathon / Event name">
      </div>

      <div class="form-group">
        <label>Category (Optional)</label>
        <select id="category">
          <option value="">Select category</option>
          <option>Hackathon</option>
          <option>Sports</option>
          <option>Technical</option>
          <option>Cultural</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description (Optional)</label>
        <textarea id="description" placeholder="Describe your achievement"></textarea>
      </div>

      <div class="date-row">
        <div class="form-group">
          <label>From <span style="color: #ff6b6b; font-size: 12px;\">(No future dates)</span></label>
          <input type="date" id="fromDate">
          <div id="fromDateError" style="color: #ff6b6b; font-size: 12px; margin-top: 4px; display: none;">⚠️ Please select a date on or before today</div>
        </div>

        <div class="form-group">
          <label>To <span style="color: #ff6b6b; font-size: 12px;\">(No future dates)</span></label>
          <input type="date" id="toDate">
          <div id="toDateError" style="color: #ff6b6b; font-size: 12px; margin-top: 4px; display: none;">⚠️ Please select a date on or before today</div>
        </div>
      </div>

      <button onclick="saveAchievement()">Save Achievement</button>
    </div>
  </div>

  <div class="card">
    <h2>My Achievements</h2>
    <div id="list">Loading...</div>
  </div>

</div>

<script>
function setMaxDate(inputId) {
  const dateInput = document.getElementById(inputId);
  if (!dateInput) return;
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const maxDate = `${yyyy}-${mm}-${dd}`;
  dateInput.max = maxDate;
}

function validateDateNotInFuture(dateInput, errorElement) {
  if (!dateInput.value) return true;
  const selectedDate = new Date(dateInput.value);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  selectedDate.setHours(0, 0, 0, 0);
  if (selectedDate > today) {
    if (errorElement) {
      errorElement.style.display = 'block';
    }
    return false;
  } else {
    if (errorElement) {
      errorElement.style.display = 'none';
    }
    return true;
  }
}

function validateDateRange() {
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  if (fromDate && toDate) {
    const from = new Date(fromDate);
    const to = new Date(toDate);
    if (to < from) {
      return false;
    }
  }
  return true;
}

document.addEventListener('DOMContentLoaded', function() {
  setMaxDate('fromDate');
  setMaxDate('toDate');
  const fromDateInput = document.getElementById('fromDate');
  const toDateInput = document.getElementById('toDate');
  if (fromDateInput) {
    fromDateInput.addEventListener('change', function() {
      validateDateNotInFuture(this, document.getElementById('fromDateError'));
      validateDateRange();
    });
    fromDateInput.addEventListener('blur', function() {
      validateDateNotInFuture(this, document.getElementById('fromDateError'));
    });
  }
  if (toDateInput) {
    toDateInput.addEventListener('change', function() {
      validateDateNotInFuture(this, document.getElementById('toDateError'));
      validateDateRange();
    });
    toDateInput.addEventListener('blur', function() {
      validateDateNotInFuture(this, document.getElementById('toDateError'));
    });
  }
});

async function saveAchievement() {
  const fromDateInput = document.getElementById('fromDate');
  const toDateInput = document.getElementById('toDate');
  if (!validateDateNotInFuture(fromDateInput, document.getElementById('fromDateError'))) {
    alert("Start date cannot be in the future!");
    fromDateInput.focus();
    return;
  }
  if (!validateDateNotInFuture(toDateInput, document.getElementById('toDateError'))) {
    alert("End date cannot be in the future!");
    toDateInput.focus();
    return;
  }
  if (!validateDateRange()) {
    alert("End date cannot be before start date!");
    return;
  }
  const body = {
    title: title.value,
    category: category.value,
    description: description.value,
    fromDate: fromDate.value || null,
    toDate: toDate.value || null
  };
  await fetch('/api/student/achievements', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify(body)
  });
  title.value = "";
  category.value = "";
  description.value = "";
  fromDate.value = "";
  toDate.value = "";
  loadAchievements();
}

async function loadAchievements() {
  const res = await fetch('/api/student/achievements', {
    credentials: 'include'
  });
  const list = document.getElementById('list');
  if (!res.ok) {
    list.innerHTML = "<div class='muted'>Please login again.</div>";
    return;
  }
  const data = await res.json();
  if (data.length === 0) {
    list.innerHTML = "<div class='muted'>No achievements yet!</div>";
    return;
  }
  list.innerHTML = data.map(a => `
    <div class="achievement">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <h4>${a.title}</h4>
          <div class="muted"><strong>Category:</strong> ${a.category || 'Other'}</div>
          <div class="muted">${a.fromDate || ''} ${a.toDate ? '– ' + a.toDate : ''}</div>
          <div style="margin-top:10px; color:#e2e8f0; font-size:14px;">${a.description || ''}</div>
        </div>
        <button class="delete-btn" onclick="deleteAchievement(${a.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

async function deleteAchievement(id) {
  if (!confirm("Delete?")) return;
  await fetch(`/api/student/achievements/${id}`, {
    method: "DELETE",
    credentials: "include"
  });
  loadAchievements();
}

loadAchievements();
</script>

</body>
</html>
