<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student Marks — Dashboard</title>
    <style>
        :root {
            --bg: #0a0e27;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        body > * { position: relative; z-index: 2; }

        /* TOPBAR - Layout adjusted for right-side button */
        .topbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Brand Left, Actions Right */
            padding: 0 30px;
            background: rgba(10, 14, 39, 0.8);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .logo {
            width: 42px; height: 42px; border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* BACK BUTTON STYLING */
        .back-btn-right {
            background: var(--accent);
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .back-btn-right:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* LAYOUT */
        .layout {
            display: flex; gap: 25px; padding: 40px 20px;
            max-width: 1200px; margin: 0 auto;
        }

        /* SIDEBAR */
        .sidebar { width: 280px; }

        .card {
            background: var(--glass);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--accent); background: var(--glass-hover); }

        /* MAIN CONTENT */
        .main { flex: 1; }

        .panel {
            background: var(--glass);
            border-radius: var(--radius);
            padding: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
        }

        h2 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }
        .subhead { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 8px; }
        th, td { padding: 14px 10px; border: 1px solid var(--glass-border); text-align: center; font-size: 14px; }
        th { background: rgba(99, 102, 241, 0.2); color: #fff; font-weight: 700; }
        td { background: rgba(0, 0, 0, 0.2); color: var(--text-main); }

        input[type="number"], input[type="text"] {
            width: 100%; padding: 8px; border-radius: 6px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: #fff; text-align: center;
        }

        input[readonly] { background: transparent; border: 0; color: #fff; font-weight: 700; }

        /* BUTTONS */
        .btn {
            padding: 10px 18px; border-radius: 8px; border: 0; cursor: pointer;
            font-weight: 700; transition: 0.3s; font-size: 14px;
        }
        .btn.primary { background: var(--accent); color: white; }
        .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 0 15px var(--accent-glow); }
        .btn.ghost { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn.ghost:hover { background: rgba(255,255,255,0.1); }

        /* LOCKED STATE */
        .locked { opacity: 0.8; pointer-events: none; }

        #semList button {
            margin-bottom: 8px; width: calc(50% - 4px);
        }

        .active-sem { background: var(--accent) !important; color: white !important; }

        @media(max-width: 880px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; }
            .topbar { padding: 0 15px; }
            .muted-welcome { display: none; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="logo">ST</div>
        <div>
            <div class="title" style="color:#fff; font-weight:600; font-size: 18px;">Marks & Grades</div>
            <div class="muted" style="font-size:12px; color:var(--text-dim)">Academic Performance</div>
        </div>
    </div>

    <div class="top-actions">
        <div class="muted-welcome" style="font-size:14px; font-weight:500">Welcome, Student</div>
        <button onclick="history.back()" class="back-btn-right">Back →</button>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">
        <div class="card">
            <div style="font-weight:700; margin-bottom:15px; color:#fff">Select Semester</div>
            <div id="semList" style="display:flex; flex-wrap:wrap; gap:8px"></div>

            <div style="margin-top:20px; display:flex; gap:10px; border-top:1px solid var(--glass-border); padding-top:20px">
                <button class="btn ghost" style="flex:1" onclick="loadLast()">Reload</button>
                <button class="btn primary" style="flex:1" onclick="saveAll()">Save All</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="panel">
            <h2 id="panelTitle">Semester Overview</h2>
            <div class="subhead" id="panelSub">Please select a semester from the sidebar to view or edit marks.</div>

            <div id="tableWrapper" style="display:none">
                <div id="lockNote" style="margin-bottom:15px; padding:10px; border-radius:8px; font-size:13px; background:rgba(99,102,241,0.1); border:1px solid var(--accent); color:#fff"></div>

                <div id="marksPanel">
                    <table id="marksTable"></table>

                    <div class="actions" style="margin-top:25px; display:flex; gap:12px">
                        <button id="saveBtn" class="btn primary" onclick="saveMarks()">Save Changes</button>
                        <button class="btn ghost" onclick="resetTable()">Reset to Last Saved</button>
                    </div>

                    <div id="feedback" style="margin-top:15px"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="historyPanel" style="display:none; margin-top:20px">
            <h3 style="margin:0 0 10px 0; font-size:18px">Submission Status</h3>
            <div id="historyText" style="color:var(--text-dim); font-size:14px">No data available.</div>
        </div>
    </main>
</div>

<script>
    const semSubjects = {
      1: ["Mathematics I","Physics","Basic Electronics","English"],
      2: ["Mathematics II","Chemistry","C Programming","Environmental Studies"],
      3: ["OOP","DBMS","DC","System Design"],
      4: ["Operating Systems","Microprocessors","Software Engineering","Computer Networks"],
      5: ["Web Technologies","Theory of Computation","Data Mining","Design & Analysis"],
      6: ["Machine Learning","Distributed Systems","Compiler Design","Cloud Computing"],
      7: ["Advanced Algorithms","Elective I","Elective II","Project Phase I"],
      8: ["Project Phase II","Internship","Elective III","Seminar"]
    };

    // ============================
    // VALIDATION CONSTRAINTS
    // ============================
    const CONSTRAINTS = {
        mse1: { max: 20, label: 'MSE 1' },
        mse2: { max: 20, label: 'MSE 2' },
        task: { max: 10, label: 'Task' },
        see: { max: 50, label: 'SEE' },
        total: { max: 100, label: 'Total' }
    };

    let semesterValidated = false;
    let currentSem = null;
    let draftMarks = {}; // Store draft marks for recovery

    function buildSemList(){
        const list = document.getElementById('semList');
        list.innerHTML = '';
        for(let s=1; s<=8; s++){
            const b = document.createElement('button');
            b.className = 'btn ghost';
            b.textContent = 'Sem ' + s;
            b.onclick = () => openSemester(s);
            b.id = 'sem-btn-' + s;
            list.appendChild(b);
        }
    }
    buildSemList();

    function getStorageKey(sem) {
        return `marks_sem_${sem}_draft`;
    }

    function saveDraftToLocalStorage(sem) {
        if (!sem || semesterValidated) return;
        const tbody = document.getElementById('marksTbody');
        const rows = tbody.querySelectorAll('tr');
        const draft = [];

        rows.forEach((row, idx) => {
            draft.push({
                subject: semSubjects[sem][idx],
                mse1: row.querySelector('.mse1').value || '',
                mse2: row.querySelector('.mse2').value || '',
                task: row.querySelector('.task').value || '',
                see: row.querySelector('.see').value || ''
            });
        });

        localStorage.setItem(getStorageKey(sem), JSON.stringify(draft));
    }

    function loadDraftFromLocalStorage(sem) {
        const key = getStorageKey(sem);
        const stored = localStorage.getItem(key);
        return stored ? JSON.parse(stored) : null;
    }

    function clearDraftFromLocalStorage(sem) {
        localStorage.removeItem(getStorageKey(sem));
    }

    function openSemester(sem){
        currentSem = sem;
        document.querySelectorAll('#semList button').forEach(btn => btn.classList.remove('active-sem'));
        document.getElementById('sem-btn-' + sem).classList.add('active-sem');

        document.getElementById('panelTitle').textContent = `Semester ${sem} Marks`;
        document.getElementById('panelSub').textContent = `Detailed score breakdown for Semester ${sem}.`;
        document.getElementById('tableWrapper').style.display = 'block';
        document.getElementById('historyPanel').style.display = 'block';
        document.getElementById('feedback').innerHTML = '';

        renderMarksTable(sem);
        loadMarksFromServer(sem);
    }

    function renderMarksTable(sem){
        const subjects = semSubjects[sem] || [];
        const table = document.getElementById('marksTable');
        table.innerHTML = `
            <thead>
                <tr>
                    <th>Subject</th>
                    <th title="Max 20">MSE 1</th>
                    <th title="Max 20">MSE 2</th>
                    <th title="Max 10">Tasks</th>
                    <th title="Max 50">SEE</th>
                    <th title="Max 100">Total</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="marksTbody"></tbody>
        `;
        const tbody = document.getElementById('marksTbody');
        subjects.forEach((sub, idx) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align:left; padding-left:15px; font-weight:500">${sub}</td>
                <td>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="number" class="mse1" data-idx="${idx}" placeholder="0-20">
                        <span class="error-tooltip" style="display:none"></span>
                    </div>
                </td>
                <td>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="number" class="mse2" data-idx="${idx}" placeholder="0-20">
                        <span class="error-tooltip" style="display:none"></span>
                    </div>
                </td>
                <td>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="number" class="task" data-idx="${idx}" placeholder="0-10">
                        <span class="error-tooltip" style="display:none"></span>
                    </div>
                </td>
                <td>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="number" class="see" data-idx="${idx}" placeholder="0-50">
                        <span class="error-tooltip" style="display:none"></span>
                    </div>
                </td>
                <td><input type="text" readonly class="total" data-idx="${idx}"></td>
                <td><input type="text" readonly class="grade" data-idx="${idx}"></td>
            `;
            tbody.appendChild(row);
        });

        Array.from(document.querySelectorAll('#marksTable input[type="number"]')).forEach(inp => {
            inp.addEventListener('input', recalcRow);
            inp.addEventListener('blur', () => saveDraftToLocalStorage(sem));
        });
    }

    function validateInput(value, fieldType) {
        if (value === '' || value === null || value === undefined) return { valid: true };
        
        const numValue = parseFloat(value);
        if (isNaN(numValue) || numValue < 0) {
            return { valid: false, message: 'Marks must be non-negative' };
        }

        const constraint = CONSTRAINTS[fieldType];
        if (numValue > constraint.max) {
            return { 
                valid: false, 
                message: `${constraint.label} should not exceed ${constraint.max}` 
            };
        }

        return { valid: true };
    }

    function recalcRow(e){
        const row = e.target.closest('tr');
        const inputWrapper = e.target.closest('.input-wrapper');
        const errorTooltip = inputWrapper.querySelector('.error-tooltip');

        // Determine field type
        let fieldType = '';
        if (e.target.classList.contains('mse1')) fieldType = 'mse1';
        else if (e.target.classList.contains('mse2')) fieldType = 'mse2';
        else if (e.target.classList.contains('task')) fieldType = 'task';
        else if (e.target.classList.contains('see')) fieldType = 'see';

        // Validate current input
        const validation = validateInput(e.target.value, fieldType);
        if (!validation.valid) {
            errorTooltip.textContent = validation.message;
            errorTooltip.style.display = 'block';
            errorTooltip.style.position = 'absolute';
            errorTooltip.style.top = '-28px';
            errorTooltip.style.left = '0';
            errorTooltip.style.whiteSpace = 'nowrap';
            errorTooltip.style.background = 'var(--danger)';
            errorTooltip.style.color = 'white';
            errorTooltip.style.padding = '4px 8px';
            errorTooltip.style.borderRadius = '4px';
            errorTooltip.style.fontSize = '12px';
            errorTooltip.style.zIndex = '10';
            e.target.style.borderColor = 'var(--danger)';
            e.target.style.borderWidth = '2px';
        } else {
            errorTooltip.style.display = 'none';
            e.target.style.borderColor = 'var(--glass-border)';
            e.target.style.borderWidth = '1px';
        }

        // Recalculate total
        const m1 = parseFloat(row.querySelector('.mse1').value) || 0;
        const m2 = parseFloat(row.querySelector('.mse2').value) || 0;
        const t = parseFloat(row.querySelector('.task').value) || 0;
        const s = parseFloat(row.querySelector('.see').value) || 0;
        const total = m1 + m2 + t + s;
        
        row.querySelector('.total').value = total.toFixed(1);
        row.querySelector('.grade').value = computeGrade(total);

        // Validate total
        const totalValidation = validateInput(total, 'total');
        if (!totalValidation.valid) {
            const totalCell = row.querySelector('.total');
            totalCell.style.color = 'var(--danger)';
            totalCell.style.fontWeight = 'bold';
        } else {
            const totalCell = row.querySelector('.total');
            totalCell.style.color = '#fff';
            totalCell.style.fontWeight = '400';
        }
    }

    function computeGrade(total){
        if(total >= 90) return 'S';
        if(total >= 80) return 'A';
        if(total >= 70) return 'B';
        if(total >= 60) return 'C';
        if(total >= 50) return 'D';
        return 'F';
    }

    function validateAllMarks() {
        const tbody = document.getElementById('marksTbody');
        const rows = tbody.querySelectorAll('tr');
        let allValid = true;
        let errors = [];

        rows.forEach((row, idx) => {
            const mse1 = row.querySelector('.mse1').value;
            const mse2 = row.querySelector('.mse2').value;
            const task = row.querySelector('.task').value;
            const see = row.querySelector('.see').value;
            const subject = semSubjects[currentSem][idx];

            // Check each field
            ['mse1', 'mse2', 'task', 'see'].forEach(field => {
                const value = row.querySelector('.' + field).value;
                const validation = validateInput(value, field);
                if (!validation.valid) {
                    allValid = false;
                    errors.push(`${subject} - ${validation.message}`);
                }
            });

            // Check total
            const m1 = parseFloat(mse1) || 0;
            const m2 = parseFloat(mse2) || 0;
            const t = parseFloat(task) || 0;
            const s = parseFloat(see) || 0;
            const total = m1 + m2 + t + s;

            if (total > 100) {
                allValid = false;
                errors.push(`${subject} - Total marks should not exceed 100 (Current: ${total})`);
            }
        });

        return { valid: allValid, errors };
    }

    function applyLockState(){
        const panel = document.getElementById('marksPanel');
        const inputs = panel.querySelectorAll('input');
        const saveBtn = document.getElementById('saveBtn');

        if(semesterValidated){
            inputs.forEach(i => i.setAttribute('readonly','true'));
            panel.classList.add('locked');
            document.getElementById('lockNote').textContent = '🔒 Locked: These marks have been verified by your mentor.';
            saveBtn.style.display = 'none';
        } else {
            inputs.forEach(i => { if(!i.classList.contains('total') && !i.classList.contains('grade')) i.removeAttribute('readonly'); });
            panel.classList.remove('locked');
            document.getElementById('lockNote').textContent = '✏️ Editable: You can update these marks until mentor validation.';
            saveBtn.style.display = 'inline-block';
        }
    }

    function applyRowLockState(row){
        const status = row.dataset.status;
        const validated = row.dataset.validated === 'true';
        const inputs = row.querySelectorAll('input:not(.total):not(.grade)');
        
        // Allow editing if rejected or still pending
        if (status === 'rejected' || status === 'pending' || !validated) {
            inputs.forEach(i => i.removeAttribute('readonly'));
            row.style.borderLeft = '4px solid var(--danger)';  // Red border for rejected
        } else {
            inputs.forEach(i => i.setAttribute('readonly', 'true'));
            row.style.borderLeft = '4px solid var(--success)';  // Green border for approved
        }
    }

    async function loadMarksFromServer(sem){
        document.getElementById('historyText').textContent = 'Fetching records...';
        try {
            const res = await fetch(`/api/marks?sem=${sem}`, { credentials: 'include' });
            if (!res.ok) {
                document.getElementById('historyText').textContent = 'No saved data found for this semester.';
                semesterValidated = false;
                
                // Try to load draft from localStorage
                const draft = loadDraftFromLocalStorage(sem);
                if (draft) {
                    document.getElementById('historyText').textContent = '📝 Loaded unsaved draft data';
                    populateTableWithData(draft);
                } else {
                    document.getElementById('historyText').textContent = 'No saved data found for this semester.';
                }
                
                applyLockState();
                return;
            }
            const data = await res.json();
            if (data.subjects && data.subjects.length > 0) {
                populateTableWithData(data.subjects);
                
                // Check if all marks are validated (approved)
                const allApproved = data.subjects.every(s => s.validated === true && s.status !== 'rejected');
                semesterValidated = allApproved;
                
                // Check if any marks are rejected
                const hasRejected = data.subjects.some(s => s.status === 'rejected');
                if (hasRejected) {
                    document.getElementById('historyText').textContent = "⚠️ Some marks were rejected. Please edit and resubmit.";
                } else if (semesterValidated) {
                    document.getElementById('historyText').textContent = "✅ All marks validated by mentor.";
                } else {
                    document.getElementById('historyText').textContent = "⏳ Awaiting validation.";
                }
                
                // Clear draft if marks were approved
                if (semesterValidated) {
                    clearDraftFromLocalStorage(sem);
                }
            } else {
                semesterValidated = false;
            }
        } catch (err) {
            document.getElementById('historyText').textContent = 'Network error.';
        }
        applyLockState();
    }

    function populateTableWithData(subjects){
        const rows = document.getElementById('marksTbody').querySelectorAll('tr');
        subjects.forEach((s, idx) => {
            const r = rows[idx];
            if(!r) return;
            r.querySelector('.mse1').value = s.mse1 ?? '';
            r.querySelector('.mse2').value = s.mse2 ?? '';
            r.querySelector('.task').value = s.task ?? '';
            r.querySelector('.see').value = s.see ?? '';
            r.querySelector('.total').value = s.total ?? '';
            r.querySelector('.grade').value = s.grade ?? '';
            
            // Store status on row for later reference
            r.dataset.status = s.status ?? 'pending';
            r.dataset.validated = s.validated ?? false;
            
            // Apply row-level lock state based on status
            applyRowLockState(r);
            
            // Trigger recalc to show any validation issues
            Array.from(r.querySelectorAll('input[type="number"]')).forEach(inp => {
                const event = new Event('input', { bubbles: true });
                inp.dispatchEvent(event);
            });
        });
    }

    async function saveMarks(){
        if(!currentSem || semesterValidated) return;

        // Validate all marks first
        const validation = validateAllMarks();
        if (!validation.valid) {
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<div style="color:var(--danger); margin-top:15px; padding:12px; border-radius:8px; background:rgba(239,68,68,0.1); border:1px solid var(--danger)">
                <strong>❌ Validation Errors:</strong>
                <ul style="margin:8px 0 0 0; padding-left:20px">
                    ${validation.errors.map(e => `<li style="font-size:13px">${e}</li>`).join('')}
                </ul>
            </div>`;
            return;
        }

        const tbody = document.getElementById('marksTbody');
        const rows = tbody.querySelectorAll('tr');
        const payload = { semester: currentSem, subjects: [] };

        rows.forEach((row, idx) => {
            const name = semSubjects[currentSem][idx];
            const mse1 = parseFloat(row.querySelector('.mse1').value) || 0;
            const mse2 = parseFloat(row.querySelector('.mse2').value) || 0;
            const task = parseFloat(row.querySelector('.task').value) || 0;
            const see  = parseFloat(row.querySelector('.see').value) || 0;
            const total = parseFloat(row.querySelector('.total').value) || (mse1+mse2+task+see);
            const grade = row.querySelector('.grade').value || computeGrade(total);
            payload.subjects.push({ name, mse1, mse2, task, see, total, grade });
        });

        const fb = document.getElementById('feedback');
        fb.innerHTML = `<div style="color:var(--accent)">Saving...</div>`;

        try {
            const res = await fetch(`/api/marks`, {
                method: 'POST',
                credentials: 'include',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            
            if(res.ok){
                // Clear draft on successful save
                clearDraftFromLocalStorage(currentSem);
                fb.innerHTML = `<div style="color:var(--success); margin-top:15px; padding:12px; border-radius:8px; background:rgba(34,197,94,0.1); border:1px solid var(--success)">✅ Saved successfully! Awaiting mentor validation.</div>`;
                loadMarksFromServer(currentSem);
            } else {
                const errorData = await res.json();
                const errorMsg = errorData.message || 'Error saving data.';
                fb.innerHTML = `<div style="color:var(--danger); margin-top:15px; padding:12px; border-radius:8px; background:rgba(239,68,68,0.1); border:1px solid var(--danger)">
                    <strong>❌ ${errorMsg}</strong>
                </div>`;
                // Keep draft for recovery
                saveDraftToLocalStorage(currentSem);
            }
        } catch(err){
            fb.innerHTML = `<div style="color:var(--danger)">Network error.</div>`;
            // Keep draft for recovery
            saveDraftToLocalStorage(currentSem);
        }
    }

    function saveAll(){ saveMarks(); }
    function resetTable(){ if(confirm('Reset current inputs?')) loadMarksFromServer(currentSem); }
    function loadLast(){ if(currentSem) openSemester(currentSem); else openSemester(1); }
</script>
</body>
</html>
