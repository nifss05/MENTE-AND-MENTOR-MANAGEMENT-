<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Student Setup</title>
    <style>
        :root {
            --bg: #0a0e27;
            --card-bg: #f8f9fc;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 10px, #eee, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        body > * { position: relative; z-index: 2; }

        /* Topbar */
        .topbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(10, 14, 39, 0.8);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: #fff;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .back-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent-hover);
            transform: translateX(5px);
        }

        /* Form Layout */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-box h2 {
            margin-top: 0;
            color: #1a2a4a;
            text-align: center;
            margin-bottom: 24px;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-message.show { display: block; }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            font-size: 13px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input:disabled, input[readonly] {
            background-color: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
        }

        .mentor-input-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .mentor-input-group input { flex: 1; margin-bottom: 0; }

        .check-btn {
            padding: 12px 18px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .check-btn:hover { background: #4338ca; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .mentor-status {
            margin-top: 8px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .mentor-status.valid { background: #dcfce7; color: #166534; display: block; border: 1px solid #bbf7d0; }
        .mentor-status.invalid { background: #fee2e2; color: #991b1b; display: block; border: 1px solid #fecaca; }

        .hidden { display: none !important; }
        
        .loading { text-align: center; color: #fff; padding: 20px; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand">
            <div class="logo">P</div>
            Student Portal
        </div>
        <button class="back-btn" onclick="history.back()">← Back</button>
    </div>

    <div class="main-content">
        <div class="form-box">
            <div id="loadingMessage" class="loading" style="color:#666">
                Verifying your session...
            </div>
            
            <div id="errorMessage" class="error-message">
                <strong>Error:</strong> <span id="errorText"></span>
                <br><br>
                <a href="index.html" style="color: inherit; font-weight: bold;">Back to Login</a>
            </div>

            <form id="studentSetupForm" class="hidden">
                <h2>Complete Your Profile</h2>
                
                <label>Full Name</label>
                <input id="name" placeholder="Full Name">
                
                <label>USN</label>
                <input id="usn" placeholder="USN" readonly>
                
                <label>Date of Birth * <span style="color: #ff6b6b; font-size: 12px;">(No future dates)</span></label>
                <input id="dob" type="date" required>
                <div id="dobError" style="color: #ff6b6b; font-size: 12px; margin-top: 4px; display: none;">⚠️ Please select a date on or before today</div>
                
                <label>Mentor ID *</label>
                <div class="mentor-input-group">
                    <input id="mentorId" placeholder="Enter Mentor ID" required>
                    <button type="button" class="check-btn" id="checkMentorBtn">Check</button>
                </div>
                <div id="mentorStatus" class="mentor-status"></div>
                
                <label>Department *</label>
                <input id="department" placeholder="e.g. Computer Science" required>
                
                <label>Academic Year *</label>
                <input id="year" placeholder="e.g. 4" type="number" min="1" max="5" required>
                
                <button type="submit" class="submit-btn" id="submitBtn">Finish Setup</button>
            </form>
        </div>
    </div>

    <script>
        let isMentorValid = false;

        // ============================================
        // DATE VALIDATION - PREVENT FUTURE DATES
        // ============================================
        function setMaxDate(inputId) {
            const dateInput = document.getElementById(inputId);
            if (!dateInput) return;
            
            // Set max date to today
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const maxDate = `${yyyy}-${mm}-${dd}`;
            dateInput.max = maxDate;
            
            console.log(`📅 Date field '${inputId}' max date set to: ${maxDate}`);
        }

        function validateDateNotInFuture(dateInput, errorElement) {
            const selectedDate = new Date(dateInput.value);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            selectedDate.setHours(0, 0, 0, 0);
            
            if (selectedDate > today) {
                if (errorElement) {
                    errorElement.style.display = 'block';
                    console.warn(`❌ Invalid date: ${dateInput.value} is in the future`);
                }
                return false;
            } else {
                if (errorElement) {
                    errorElement.style.display = 'none';
                }
                return true;
            }
        }

        // Add real-time validation to DOB field
        document.addEventListener('DOMContentLoaded', function() {
            const dobInput = document.getElementById('dob');
            if (dobInput) {
                dobInput.addEventListener('change', function() {
                    validateDateNotInFuture(this, document.getElementById('dobError'));
                    console.log('✓ DOB change event - validation checked');
                });
                
                dobInput.addEventListener('blur', function() {
                    validateDateNotInFuture(this, document.getElementById('dobError'));
                });
            }
        });

        async function loadStudentDetails() {
            try {
                const res = await fetch('/api/student/me', { credentials: 'include' });

                if (!res.ok) {
                    document.getElementById("loadingMessage").classList.add("hidden");
                    document.getElementById("errorMessage").classList.add("show");
                    document.getElementById("errorText").textContent = "Session expired. Please log in again.";
                    return;
                }

                const data = await res.json();
                document.getElementById("name").value = data.name || "";
                document.getElementById("usn").value = data.usn || "";
                
                // Initialize date field with max date restriction
                setMaxDate('dob');
                
                document.getElementById("loadingMessage").classList.add("hidden");
                document.getElementById("studentSetupForm").classList.remove("hidden");
                
            } catch (err) {
                console.error(err);
                document.getElementById("loadingMessage").innerText = "Failed to connect to server.";
            }
        }

        document.getElementById("checkMentorBtn").addEventListener("click", async () => {
            const mentorId = document.getElementById("mentorId").value.trim();
            const statusDiv = document.getElementById("mentorStatus");
            
            if (!mentorId) {
                statusDiv.className = "mentor-status invalid";
                statusDiv.textContent = "Please enter a mentor ID";
                return;
            }

            try {
                const res = await fetch(`/api/student/validate-mentor/${mentorId}`, { credentials: 'include' });
                const data = await res.json();

                if (data.valid) {
                    statusDiv.className = "mentor-status valid";
                    statusDiv.textContent = "✓ " + data.message;
                    isMentorValid = true;
                } else {
                    statusDiv.className = "mentor-status invalid";
                    statusDiv.textContent = "✗ " + data.message;
                    isMentorValid = false;
                }
            } catch (err) {
                statusDiv.className = "mentor-status invalid";
                statusDiv.textContent = "Error validating mentor";
            }
        });

        document.getElementById("studentSetupForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            if (!isMentorValid) {
                alert("Please validate the mentor ID first!");
                return;
            }

            // ✅ VALIDATE DATE NOT IN FUTURE
            const dobInput = document.getElementById("dob");
            if (!validateDateNotInFuture(dobInput, document.getElementById('dobError'))) {
                alert("❌ ERROR: Date of Birth cannot be in the future!\nPlease select a date on or before today.");
                dobInput.focus();
                return;
            }

            const payload = {
                name: document.getElementById("name").value.trim(),
                dob: document.getElementById("dob").value,
                mentorId: document.getElementById("mentorId").value.trim(),
                department: document.getElementById("department").value.trim(),
                academicYear: parseInt(document.getElementById("year").value)
            };

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.textContent = "Saving...";

            try {
                const res = await fetch("/api/student/setup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    localStorage.setItem("studentName", payload.name);
                    window.location = "student_dashboard.html";
                } else {
                    alert("Setup failed: " + await res.text());
                    btn.disabled = false;
                    btn.textContent = "Finish Setup";
                }
            } catch (err) {
                alert("Something went wrong.");
                btn.disabled = false;
            }
        });

        window.addEventListener('load', loadStudentDetails);
    </script>
</body>
</html>
