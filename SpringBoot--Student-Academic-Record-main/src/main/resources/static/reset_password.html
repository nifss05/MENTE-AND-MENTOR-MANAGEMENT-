<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Student Portal</title>

    <style>
        * { 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
          content:'';
          position:fixed;top:0;left:0;width:100%;height:100%;
          background-image:radial-gradient(2px 2px at 20px 30px,#eee,rgba(0,0,0,0)),radial-gradient(2px 2px at 60px 70px,#fff,rgba(0,0,0,0)),radial-gradient(1px 1px at 50px 50px,#ddd,rgba(0,0,0,0)),radial-gradient(1px 1px at 130px 80px,#fff,rgba(0,0,0,0)),radial-gradient(2px 2px at 90px 10px,#eee,rgba(0,0,0,0));
          background-repeat:repeat;background-size:200px 200px;animation:twinkle 5s infinite;pointer-events:none;z-index:1;
        }
        @keyframes twinkle {0%,100%{opacity:0.5}50%{opacity:1}}
        body > * {position:relative;z-index:2}

        .container {
            background: #f8f9fc;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
            border: 1px solid rgba(102,126,234,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            color: #1a2a4a;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #f44336;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease;
            background: #ff9800;
        }

        .password-strength.weak .password-strength-bar { 
            width: 33%; 
            background: #f44336;
        }

        .password-strength.medium .password-strength-bar { 
            width: 66%; 
            background: #ff9800;
        }

        .password-strength.strong .password-strength-bar { 
            width: 100%; 
            background: #4caf50;
        }

        .password-strength.display {
            display: block;
        }

        .password-info {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        .match-indicator {
            display: inline-block;
            margin-left: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .match-indicator.match {
            color: #4caf50;
        }

        .match-indicator.no-match {
            color: #f44336;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .icon {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <div class="icon">🔐</div>
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below</p>
    </div>

    <form id="resetForm" onsubmit="resetPassword(event)">
        <input type="hidden" id="token">

        <div class="form-group">
            <label for="password">New Password</label>
            <input 
                type="password" 
                id="password" 
                placeholder="Enter new password"
                required
            >
            <div class="password-strength" id="strengthIndicator">
                <div class="password-strength-bar"></div>
            </div>
            <div class="password-info">
                Password must be at least 8 characters long
            </div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">
                Confirm Password
                <span class="match-indicator" id="matchIndicator" style="display: none;"></span>
            </label>
            <input 
                type="password" 
                id="confirmPassword" 
                placeholder="Confirm your password"
                required
            >
        </div>

        <button type="submit" id="submitBtn">Reset Password</button>
    </form>

    <div id="message" class="message"></div>

    <div class="back-link">
        <a href="index.html">← Back to Login</a>
    </div>
</div>

<script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    
    if (!token) {
        showMessage("Invalid reset link. Please request a new password reset.", "error");
        document.getElementById("resetForm").style.display = "none";
    }
    
    document.getElementById("token").value = token;

    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const matchIndicator = document.getElementById("matchIndicator");
    const strengthIndicator = document.getElementById("strengthIndicator");

    // Password strength checker
    passwordInput.addEventListener("input", function() {
        const password = this.value;
        let strength = "weak";

        if (password.length >= 8) {
            if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) {
                strength = "strong";
            } else if (password.length >= 10 && (/[A-Z]/.test(password) || /[0-9]/.test(password))) {
                strength = "medium";
            } else if (password.length >= 8) {
                strength = "weak";
            }
        }

        strengthIndicator.className = "password-strength display " + strength;
        checkPasswordMatch();
    });

    // Password match checker
    confirmInput.addEventListener("input", checkPasswordMatch);

    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (!password || !confirm) {
            matchIndicator.style.display = "none";
            return;
        }

        matchIndicator.style.display = "inline-block";
        
        if (password === confirm) {
            matchIndicator.className = "match-indicator match";
            matchIndicator.textContent = "✓ Passwords match";
            confirmInput.classList.remove("error");
        } else {
            matchIndicator.className = "match-indicator no-match";
            matchIndicator.textContent = "✗ Passwords don't match";
            confirmInput.classList.add("error");
        }
    }

    function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.textContent = text;
        messageDiv.className = "message show " + type;

        if (type === "success") {
            setTimeout(() => {
                window.location.href = "index.html";
            }, 3000);
        }
    }

    async function resetPassword(e) {
        e.preventDefault();

        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;
        const submitBtn = document.getElementById("submitBtn");

        // Validation
        if (password.length < 8) {
            showMessage("Password must be at least 8 characters long", "error");
            passwordInput.classList.add("error");
            return;
        }

        if (password !== confirmPassword) {
            showMessage("Passwords do not match", "error");
            confirmInput.classList.add("error");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";

        try {
            const res = await fetch("/api/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    token: token,
                    newPassword: password
                })
            });

            const msg = await res.text();

            if (res.ok) {
                showMessage("✓ Password reset successfully! Redirecting to login...", "success");
            } else {
                showMessage(msg || "Failed to reset password. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Reset Password";
            }

        } catch (err) {
            console.error(err);
            showMessage("An error occurred. Please try again.", "error");
            submitBtn.disabled = false;
            submitBtn.textContent = "Reset Password";
        }
    }
</script>

</body>
</html>
