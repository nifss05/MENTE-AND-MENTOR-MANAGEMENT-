<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Mentees</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Inter, Arial, sans-serif;
  background:#0a0e27;
  margin:0;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* Starfield background */
body::before {
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:
    radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
    radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
    radial-gradient(2px 2px at 90px 10px, #eee, rgba(0,0,0,0));
  background-repeat:repeat;
  background-size:200px 200px;
  animation:twinkle 5s infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes twinkle {
  0%, 100% { opacity:0.5; }
  50% { opacity:1; }
}

body > * {
  position:relative;
  z-index:2;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.container {
  max-width:1100px;
  margin:40px auto;
  background:#f8f9fc;
  padding:30px;
  border-radius:10px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  animation: fadeInUp 0.6s ease;
  border: 1px solid rgba(102, 126, 234, 0.2);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}


.container:hover {
  transform: translateY(-4px);
  box-shadow:0 25px 60px rgba(102, 126, 234, 0.3);
}
h2 {
  margin-top:0;
  margin-bottom:24px;
  color:#1a2a4a;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  padding:16px 12px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
  color:#1a2a4a;
}
th {
  background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:white;
  font-weight:600;
}

tr {
  animation: fadeInUp 0.6s ease;
  transition: all 0.2s ease;
}

tbody tr:hover {
  background-color:#f0f4f9;
  box-shadow: inset 0 0 10px rgba(102, 126, 234, 0.1);
}
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.ok { background:#dcfce7; color:#166534; }
.missing { background:#fee2e2; color:#991b1b; }

button {
  padding:8px 16px;
  border-radius:6px;
  border:none;
  background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:white;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  transition:all 0.3s ease;
  box-shadow:0 2px 6px rgba(102, 126, 234, 0.3);
  width:auto;
  display:inline-block;
}

button:hover {
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(102, 126, 234, 0.4);
}

button:active {
  transform:translateY(0);
  box-shadow:0 2px 4px rgba(102, 126, 234, 0.3);
}

.back-btn {
  display: inline-block;
  margin-bottom: 16px;
  padding: 8px 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-size:13px;
  transition:all 0.3s ease;
  box-shadow:0 2px 6px rgba(102, 126, 234, 0.3);
}

.back-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(102, 126, 234, 0.4);
}
</style>
</head>

<body>
<div class="container">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <h2>👨‍🎓 My Mentees</h2>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>USN</th>
        <th>Department</th>
        <th>Academic Year</th>
        <th>Profile</th>
      </tr>
    </thead>
    <tbody id="menteesTable">
      <tr><td colspan="5">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function loadMentees() {
  const res = await fetch('/api/mentor/mentees', {
    method: 'GET',
    credentials: 'include'   //  MANDATORY
})

  if (!res.ok) {
    document.getElementById('menteesTable').innerHTML =
      '<tr><td colspan="5">Unauthorized</td></tr>';
    return;
  }

  const students = await res.json();

  if (students.length === 0) {
    document.getElementById('menteesTable').innerHTML =
      '<tr><td colspan="5">No mentees assigned</td></tr>';
    return;
  }

  document.getElementById('menteesTable').innerHTML =
  students.map(s => `
    <tr>
      <td>${s.name || '-'}</td>
      <td>${s.usn}</td>
      <td>${s.department || '-'}</td>
      <td>${s.academicYear || '-'}</td>
      <td>
        <button onclick="viewStudent(${s.studentId})">View</button>
      </td>
    </tr>
  `).join('');
}

function viewStudent(id) {
  window.location.href = "/mentor_viewstudentprofile.html?studentId=" + id;
}

loadMentees();
</script>
</body>
</html>
