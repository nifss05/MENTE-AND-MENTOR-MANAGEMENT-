<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Setup</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0e27; padding: 30px;margin:0;min-height:100vh;position:relative;overflow-x:hidden }
        body::before {content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(2px 2px at 20px 30px,#eee,rgba(0,0,0,0)),radial-gradient(2px 2px at 60px 70px,#fff,rgba(0,0,0,0)),radial-gradient(1px 1px at 50px 50px,#ddd,rgba(0,0,0,0)),radial-gradient(1px 1px at 130px 80px,#fff,rgba(0,0,0,0)),radial-gradient(2px 2px at 90px 10px,#eee,rgba(0,0,0,0));background-repeat:repeat;background-size:200px 200px;animation:twinkle 5s infinite;pointer-events:none;z-index:1}
        @keyframes twinkle {0%,100%{opacity:0.5}50%{opacity:1}}
        body > * {position:relative;z-index:2}
        .container { background: #f8f9fc; padding: 30px; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); max-width: 500px; margin: auto;border:1px solid rgba(102,126,234,0.2);animation:fadeInUp 0.6s ease; }
        @keyframes fadeInUp {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 8px; cursor: pointer;font-weight:600;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(102,126,234,0.3) }
        button:hover { background: linear-gradient(135deg,#667eea,#764ba2);transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4) }
    </style>
</head>
<body>
<div class="topbar" style="display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:rgba(102,126,234,0.1); border-bottom:1px solid rgba(102,126,234,0.2); margin-bottom:30px; border-radius:8px 8px 0 0;">
    <div class="brand" style="color:white; font-weight:bold; font-size:18px;">Mentor Setup</div>
    <button onclick="logout()" style="padding:8px 16px; background:#ef4444; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px;">Logout</button>
</div>

<div class="container">
    <h2>Mentor Setup</h2>
    
    <div id="loadingMessage" class="loading" style="color:#666; text-align:center;">
        Verifying your session...
    </div>
    
    <div id="errorMessage" class="error-message" style="display:none; background:#fee2e2; color:#991b1b; padding:12px; border-radius:6px; margin-bottom:20px; border:1px solid #fecaca;">
        <strong>Error:</strong> <span id="errorText"></span>
        <br><br>
        <a href="index.html" style="color: inherit; font-weight: bold;">Back to Login</a>
    </div>
    
    <form id="mentorSetupForm" style="display:none;">
        <input id="name" placeholder="Full Name" required>
        <input id="email" type="email" placeholder="Email" required>
        <input id="department" placeholder="Department (e.g. CSE)" required>
        <button type="submit">Submit</button>
    </form>
</div>

<script>
    function logout() {
        fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
            .then(() => window.location = "index.html")
            .catch(err => window.location = "index.html");
    }

    // Verify mentor session on page load
    window.addEventListener('load', async () => {
        try {
            const res = await fetch('/api/mentor/me', { credentials: 'include' });
            
            if (!res.ok) {
                document.getElementById("loadingMessage").style.display = "none";
                document.getElementById("errorMessage").style.display = "block";
                document.getElementById("errorText").textContent = "You must be logged in as a mentor to access this page.";
                return;
            }
            
            const user = await res.json();
            
            // Populate pre-filled fields if data exists
            if (user.name) document.getElementById("name").value = user.name;
            if (user.email) document.getElementById("email").value = user.email;
            if (user.department) document.getElementById("department").value = user.department;
            
            // Show form, hide loading
            document.getElementById("loadingMessage").style.display = "none";
            document.getElementById("mentorSetupForm").style.display = "block";
        } catch (err) {
            console.error("Session check failed:", err);
            document.getElementById("loadingMessage").style.display = "none";
            document.getElementById("errorMessage").style.display = "block";
            document.getElementById("errorText").textContent = "Failed to connect to server.";
        }
    });

    document.getElementById("mentorSetupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        department: document.getElementById("department").value.trim()
      };

      if (!payload.name || !payload.email || !payload.department) {
        alert("All fields are required!");
        return;
      }

      const res = await fetch('/api/mentor/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',   // ✅ ensure session cookie is sent
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        alert("Setup complete!");
        window.location = "mentor_dashboard.html";
      } else {
        alert(await res.text());
      }
    });
</script>
</body>
</html>
