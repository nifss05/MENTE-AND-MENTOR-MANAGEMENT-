<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Certificate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0a0e27;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.15);
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.4);
  --text-main: #f8fafc;
  --text-dim: #94a3b8;
  --radius: 12px;
}

body {
  font-family: 'Inter', Arial, sans-serif;
  background: var(--bg);
  color: var(--text-main);
  margin: 0;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Starfield Background Layer */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 60px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1px 1px at 150px 150px, #ddd, rgba(0,0,0,0));
  background-repeat: repeat;
  background-size: 200px 200px;
  animation: twinkle 5s infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

body > * { position: relative; z-index: 2; }

/* ===== TOPBAR ===== */
.topbar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between; /* Pushes content to opposite ends */
  padding: 0 30px;
  background: rgba(10, 14, 39, 0.8);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  animation: slideDown 0.5s ease;
}

@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  box-shadow: 0 0 15px var(--accent-glow);
}

.back-btn {
  display: inline-flex;
  align-items: center;
  padding: 8px 18px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.back-btn:hover {
  background: #4f46e5;
  box-shadow: 0 0 15px var(--accent-glow);
  transform: translateY(-2px);
}

/* ===== UPLOAD CARD ===== */
.card {
  max-width: 500px;
  margin: 60px auto;
  background: var(--glass);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: var(--radius);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  border: 1px solid var(--glass-border);
  animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

h2 {
  text-align: center;
  color: #fff;
  margin-top: 0;
  margin-bottom: 30px;
  font-size: 24px;
}

label {
  font-weight: 600;
  color: #e2e8f0;
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
}

.activity-info {
  margin-bottom: 20px;
  padding: 12px;
  border-radius: 8px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid var(--accent);
  display: none;
}

.activity-info.show {
  display: block;
}

.activity-info p {
  margin: 4px 0;
  font-size: 13px;
  color: #cbd5e1;
}

.activity-info .points {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.3s ease;
  box-sizing: border-box;
}

select {
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 1.5em;
  padding-right: 2.5rem;
}

select:focus, input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

input[type="file"] {
  padding: 10px;
  font-size: 12px;
  cursor: pointer;
}

.upload-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 700;
  transition: all 0.3s ease;
  margin-top: 10px;
}

.upload-btn:hover {
  background: #4f46e5;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-2px);
}

#preview {
  display: none;
  margin-top: 20px;
  margin-bottom: 20px;
  max-width: 100%;
  border-radius: 10px;
  border: 2px solid var(--glass-border);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">UC</div>
    <div style="color:#ffffff; font-weight:600; font-size:18px;">Upload Certificate</div>
  </div>
  <button class="back-btn" onclick="history.back()">Back →</button>
</div>

<div class="card">
  <h2>Certificate Details</h2>

  <label>AICTE Based Activity <span style="color: var(--accent);">*</span></label>
  <select id="activitySlNo" onchange="updateActivityInfo()">
    <option value="">-- Loading activities... --</option>
  </select>

  <div id="activityInfo" class="activity-info">
    <p><strong>Activity:</strong> <span id="activityDetail"></span></p>
    <p><strong>Activity Points:</strong> <span class="points" id="activityPoints">0</span></p>
  </div>

  <label>Certificate Image <span style="color: var(--accent);">*</span></label>
  <input type="file" id="file" accept="image/*" onchange="previewImage()">
  
  <img id="preview" alt="Certificate Preview">
  
  <button class="upload-btn" onclick="upload()">Upload Now</button>
</div>

<script>
// ============================
// ACTIVITY DATA STORAGE
// ============================
let activitiesData = {};

// ============================
// INITIALIZE ON PAGE LOAD
// ============================
document.addEventListener('DOMContentLoaded', () => {
    loadActivities();
});

// ============================
// LOAD ACTIVITIES FROM SERVER
// ============================
async function loadActivities() {
    const dropdown = document.getElementById("activitySlNo");
    
    try {
        console.log("📡 Fetching activities from /api/student/activities...");
        
        const res = await fetch("/api/student/activities", {
            credentials: "include"
        });
        
        console.log("📊 Response status:", res.status);
        
        if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }

        const data = await res.json();
        console.log("✅ Activities loaded successfully:", data);

        if (!data.activities || data.activities.length === 0) {
            console.error("❌ No activities in response");
            dropdown.innerHTML = '<option value="">-- No activities available --</option>';
            alert("No activities found. Please contact admin.");
            return;
        }

        console.log(`✅ Adding ${data.activities.length} activities to dropdown`);
        
        // Keep the placeholder option
        dropdown.innerHTML = '<option value="">-- Select an Activity --</option>';
        
        data.activities.forEach((activity, index) => {
            console.log(`Adding activity ${index + 1}: ${activity.displayText}`);
            activitiesData[activity.slNo] = activity;
            const option = document.createElement("option");
            option.value = activity.slNo;
            option.textContent = activity.displayText;
            dropdown.appendChild(option);
        });
        
        console.log(`✅ Total activities in dropdown: ${dropdown.options.length - 1}`);
        
    } catch (error) {
        console.error("❌ Error loading activities:", error);
        dropdown.innerHTML = '<option value="">-- Error loading activities --</option>';
        alert(`Failed to load activity list: ${error.message}\n\nPlease check your connection and refresh the page.`);
    }
}

// ============================
// UPDATE ACTIVITY INFORMATION
// ============================
function updateActivityInfo() {
    const dropdown = document.getElementById("activitySlNo");
    const selectedSlNo = dropdown.value;
    const activityInfo = document.getElementById("activityInfo");
    
    if (!selectedSlNo) {
        activityInfo.classList.remove("show");
        return;
    }

    const activity = activitiesData[selectedSlNo];
    if (activity) {
        document.getElementById("activityDetail").textContent = activity.detail;
        document.getElementById("activityPoints").textContent = activity.points + " pts";
        activityInfo.classList.add("show");
    } else {
        activityInfo.classList.remove("show");
    }
}

// ============================
// UPLOAD CERTIFICATE
// ============================
async function upload() {
    const activitySlNo = document.getElementById("activitySlNo").value;
    const fileInput = document.getElementById("file");

    if (!activitySlNo) {
        alert("Please select an activity from the dropdown");
        return;
    }

    if (!fileInput.files.length) {
        alert("Please select a certificate image");
        return;
    }

    const formData = new FormData();
    formData.append("activitySlNo", activitySlNo);
    formData.append("file", fileInput.files[0]);

    try {
        const uploadBtn = document.querySelector(".upload-btn");
        uploadBtn.textContent = "Uploading...";
        uploadBtn.disabled = true;

        const res = await fetch("/api/student/certificate/upload", {
            method: "POST",
            body: formData,
            credentials: "include"
        });

        const resultData = await res.json();
        
        if (res.ok) {
            alert(`✅ Certificate uploaded successfully!\n\nActivity: ${resultData.activityDetail}\nPoints Awarded: ${resultData.points}`);
            window.location.href = "student_certificates.html"; 
        } else {
            alert(`❌ Upload failed: ${resultData.message || 'Unknown error'}`);
            uploadBtn.textContent = "Upload Now";
            uploadBtn.disabled = false;
        }
    } catch (error) {
        console.error("Upload error:", error);
        alert("Upload failed. Please try again.");
        const uploadBtn = document.querySelector(".upload-btn");
        uploadBtn.textContent = "Upload Now";
        uploadBtn.disabled = false;
    }
}

// ============================
// PREVIEW IMAGE
// ============================
function previewImage() {
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");

    if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
}
</script>

</body>
</html>
