<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Validation | Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
          --bg: #0a0e27;
          --card: rgba(255, 255, 255, 0.05);
          --accent: #667eea;
          --muted: #a0aec0;
          --radius: 12px;
          --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        /* HIDE SCROLLBAR */
        html, body {
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { display: none; }

        body {
          margin: 0;
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
          background: var(--bg);
          color: #ffffff;
          min-height: 100vh;
        }

        /* Starfield background */
        body::before {
          content: '';
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background-image:
            radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
            radial-gradient(1px 1px at 150px 150px, #ddd, rgba(0,0,0,0));
          background-repeat: repeat;
          background-size: 300px 300px;
          z-index: 1;
          pointer-events: none;
        }

        body > * { position: relative; z-index: 2; }

        .topbar {
          height: 64px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 24px;
          background: rgba(10, 14, 39, 0.8);
          border-bottom: 1px solid rgba(102, 126, 234, 0.2);
          backdrop-filter: blur(12px);
          position: sticky;
          top: 0;
        }

        .container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 32px 20px;
        }

        h2 { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: white; }
        h3 { font-size: 18px; margin-top: 40px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* LIST LAYOUT */
        .cert-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 20px;
          margin-top: 15px;
        }

        .card {
          background: var(--card);
          backdrop-filter: blur(15px);
          border-radius: var(--radius);
          padding: 24px;
          border: 1px solid var(--border);
          transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .card b { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card span { display: block; margin-bottom: 8px; font-weight: 500; }

        img.cert-thumb {
          width: 100%;
          height: 160px;
          object-fit: cover;
          border-radius: 8px;
          margin-top: 12px;
          cursor: pointer;
          border: 1px solid var(--border);
          transition: 0.2s;
        }
        img.cert-thumb:hover { opacity: 0.8; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }

        button {
          flex: 1;
          padding: 10px;
          border-radius: 8px;
          border: none;
          font-weight: 700;
          cursor: pointer;
          font-size: 13px;
          transition: 0.2s;
        }

        .approve { background: #16a34a; color: white; }
        .reject { background: #dc2626; color: white; }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        /* TABLE STYLES */
        .table-wrapper {
          overflow-x: auto;
          background: var(--card);
          border-radius: var(--radius);
          border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: rgba(255,255,255,0.03); color: var(--muted); text-align: left; padding: 16px; font-size: 11px; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        tr:hover td { background: rgba(102, 126, 234, 0.05); }

        /* MODAL */
        .modal {
          display: none;
          position: fixed;
          z-index: 10000;
          left: 0; top: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.9);
          backdrop-filter: blur(5px);
          padding: 40px;
        }
        .modal-content {
          max-width: 90%;
          max-height: 80vh;
          margin: auto;
          display: block;
          border-radius: 12px;
          box-shadow: 0 0 30px rgba(102,126,234,0.5);
        }
        .close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }

        .back-btn {
          text-decoration: none;
          color: var(--muted);
          font-size: 13px;
          font-weight: 500;
          padding: 8px 12px;
          border-radius: 6px;
          border: 1px solid var(--border);
          transition: 0.2s;
        }
        .back-btn:hover { color: white; background: rgba(255,255,255,0.05); }

        /* TOAST */
        .toast {
          position: fixed;
          bottom: 20px; right: 20px;
          padding: 16px 24px;
          border-radius: 8px;
          z-index: 10001;
          font-weight: 600;
          animation: slideIn 0.3s ease forwards;
        }
        .toast.success { background: #16a34a; color: white; }
        .toast.error { background: #dc2626; color: white; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>

<body>

<nav class="topbar">
    <a href="mentor_dashboard.html" class="back-btn">← Back to Dashboard</a>
    <div style="font-weight: 700; letter-spacing: 1px;">VALIDATION CENTER</div>
    <div style="width: 100px;"></div> </nav>

<div class="container">
    <h2>Pending Requests</h2>
    <div id="list">
        <div style="color: var(--muted); padding: 40px; text-align: center;">Scanning records...</div>
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg" class="modal-content">
    <div style="text-align:center; margin-top:20px">
        <a id="downloadLink" style="background:var(--accent); color:white; padding:12px 24px; border-radius:8px; text-decoration:none; font-weight:700">
            Download Document
        </a>
    </div>
</div>

<script>
    function showNotification(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    async function loadPending() {
      const list = document.getElementById("list");
      const res = await fetch('/api/mentor/pending', { credentials:'include' });

      if (!res.ok) {
        list.innerHTML = "<div class='card'>Unauthorized. Please login again.</div>";
        return;
      }

      const data = await res.json();
      const certs = data.certificates || [];
      const marks = data.marks || [];

      if (certs.length === 0 && marks.length === 0) {
        list.innerHTML = "<div style='text-align:center; padding:100px 0;'><h1 style='font-size:50px'>🎉</h1><p style='color:var(--muted)'>All caught up! No pending validations.</p></div>";
        return;
      }

      let html = "";

      if (certs.length > 0) {
        html += `<h3>📄 Certificates (${certs.length})</h3><div class="cert-grid">`;
        html += certs.map(c => `
          <div class="card">
            <b>Student USN</b><span>${c.studentUsn}</span>
            <b>Type</b><span>${c.certificateType}</span>
            <b>Activity Points</b><span>${c.activityPoints}</span>
            <img class="cert-thumb" src="/${c.filePath}" onclick="openModal('/${c.filePath}')">
            <div class="btn-group">
              <button class="approve" onclick="approveCert('${c.certificateId || c.id}')">Approve</button>
              <button class="reject" onclick="rejectCert('${c.certificateId || c.id}')">Reject</button>
            </div>
          </div>
        `).join("");
        html += `</div>`;
      }

      if (marks.length > 0) {
        html += `<h3>📊 Academic Marks (${marks.length})</h3>`;
        html += `
          <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>USN</th><th>Sem</th><th>Subject</th><th>Marks</th><th>Grade</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
        `;
        html += marks.map(m => `
          <tr>
            <td style="color:white; font-weight:600;">${m.studentUsn}</td>
            <td>${m.semester}</td>
            <td>${m.subject}</td>
            <td>${m.totalMarks}</td>
            <td><span style="color:var(--accent); font-weight:700;">${m.grade}</span></td>
            <td style="width: 200px;">
              <div class="btn-group" style="margin:0">
                <button class="approve" onclick="approveMarks('${m.markId || m.id}')">Approve</button>
                <button class="reject" onclick="rejectMarks('${m.markId || m.id}')">Reject</button>
              </div>
            </td>
          </tr>
        `).join("");
        html += `</tbody></table></div>`;
      }
      list.innerHTML = html;
    }

    async function approveCert(id) {
      const res = await fetch(`/api/mentor/certificate/${id}/approve`, { method:"POST", credentials:"include" });
      res.ok ? showNotification('Approved!') : showNotification('Error', 'error');
      loadPending();
    }

    async function rejectCert(id) {
      const note = prompt("Rejection Reason:");
      if(note === null) return;
      const res = await fetch(`/api/mentor/certificate/${id}/reject`, {
        method:"POST",
        credentials:"include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rejectionNote: note })
      });
      res.ok ? showNotification('Rejected') : showNotification('Error', 'error');
      loadPending();
    }

    async function approveMarks(id) {
      const res = await fetch(`/api/mentor/marks/${id}/approve`, { method:"POST", credentials:"include" });
      res.ok ? showNotification('Marks Approved') : showNotification('Error', 'error');
      loadPending();
    }

    async function rejectMarks(id) {
      const res = await fetch(`/api/mentor/marks/${id}/reject`, { method:"POST", credentials:"include" });
      res.ok ? showNotification('Marks Rejected') : showNotification('Error', 'error');
      loadPending();
    }

    function openModal(src) {
      document.getElementById("modalImg").src = src;
      document.getElementById("downloadLink").href = "/api/mentor/certificate/download?path=" + encodeURIComponent(src);
      document.getElementById("imageModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    loadPending();
</script>
</body>
</html>
