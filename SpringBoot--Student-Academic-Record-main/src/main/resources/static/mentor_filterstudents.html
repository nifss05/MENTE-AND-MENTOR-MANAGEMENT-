<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Filter Students | Mentor Portal</title>

    <style>
        :root{
          --bg:#0a0e27;
          --card: rgba(255, 255, 255, 0.05);
          --accent:#667eea;
          --muted:#a0aec0;
          --radius:12px;
          --border: rgba(255, 255, 255, 0.1);
        }

        *{box-sizing:border-box}

        /* HIDE SCROLLBAR */
        html, body {
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { display: none; }

        body {
          margin:0;
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
          background: var(--bg);
          color:#ffffff;
          min-height:100vh;
        }

        /* Animated Starfield background */
        body::before {
          content:'';
          position:fixed;
          top:0; left:0; width:100%; height:100%;
          background-image:
            radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
            radial-gradient(1px 1px at 150px 150px, #ddd, rgba(0,0,0,0));
          background-repeat:repeat;
          background-size:300px 300px;
          z-index:1;
          pointer-events:none;
        }

        body > * { position:relative; z-index:2; }

        .topbar{
          height:64px;
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding:0 24px;
          background: rgba(10, 14, 39, 0.8);
          border-bottom: 1px solid rgba(102, 126, 234, 0.2);
          backdrop-filter: blur(12px);
          position: sticky;
          top: 0;
        }

        .brand{display:flex;align-items:center;gap:12px}

        .logo{
          width:38px;height:38px;border-radius:8px;
          background:linear-gradient(135deg, #667eea, #764ba2);
          display:flex;align-items:center;justify-content:center;
          color:white;font-weight:700;
        }

        .nav-title{font-size:18px;font-weight:700;color:white;}
        
        .back-btn {
            text-decoration: none;
            color: var(--muted);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; background: rgba(255,255,255,0.05); }

        .container{
          max-width:1100px;
          margin:32px auto;
          padding:0 20px;
          display:flex;
          flex-direction:column;
          gap:24px;
        }

        .card{
          background: var(--card);
          backdrop-filter: blur(15px);
          border-radius:var(--radius);
          padding:24px;
          border: 1px solid var(--border);
          box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .filters-grid{
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
          gap:20px;
          margin-bottom: 20px;
        }

        .input-group{
          display:flex;
          flex-direction:column;
          gap:8px;
        }

        label{
          font-size:11px;
          color: var(--accent);
          font-weight:700;
          text-transform: uppercase;
          letter-spacing: 1px;
        }

        select{
          padding:12px;
          border-radius:8px;
          border: 1px solid var(--border);
          background: rgba(255,255,255,0.03);
          color: white;
          font-size: 14px;
          outline: none;
        }
        select option { background: #0a0e27; color: white; }

        .btn-apply{
          padding: 12px 28px;
          border-radius: 8px;
          border: 0;
          cursor: pointer;
          font-weight: 700;
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: white;
          transition: 0.3s;
        }

        .btn-view {
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
            border: 1px solid var(--accent);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            display: inline-block;
        }
        .btn-view:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        /* Table Wrapper */
        .table-wrapper { overflow-x: auto; }

        table{
          width:100%;
          border-collapse:collapse;
          min-width: 600px;
        }

        th{
          background: rgba(255,255,255,0.02);
          color: var(--muted);
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 1px;
          text-align: left;
          padding: 16px;
          border-bottom: 1px solid var(--border);
        }

        td{
          padding: 16px;
          font-size: 14px;
          color: #e2e8f0;
          border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        tr:hover td { background: rgba(102, 126, 234, 0.03); }

        @media(max-width:768px){
          .filters-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<nav class="topbar">
    <div class="brand">
        <div class="logo">M</div>
        <div class="nav-title">Mentee Directory</div>
    </div>
    <a href="mentor_dashboard.html" class="back-btn">← Dashboard</a>
</nav>

<div class="container">

    <div class="card">
        <div class="filters-grid">
            <div class="input-group">
                <label>Academic Year</label>
                <select id="yearFilter">
                    <option value="">All Years</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>

            <div class="input-group">
                <label>Department</label>
                <select id="deptFilter">
                    <option value="">All Departments</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="ME">ME</option>
                    <option value="CE">CE</option>
                </select>
            </div>

            <div class="input-group">
                <label>Submission Status</label>
                <select id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="APPROVED">Approved</option>
                    <option value="PENDING">Pending</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
        </div>
        <button class="btn-apply" onclick="filterStudents()">Apply Filters</button>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>USN</th>
                        <th>Department</th>
                        <th>Year</th>
                        <th style="text-align: right; padding-right: 32px;">Action</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function filterStudents() {
        const year = document.getElementById("yearFilter").value;
        const dept = document.getElementById("deptFilter").value;
        const status = document.getElementById("statusFilter").value;
        const table = document.getElementById("studentsTable");

        table.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px; color:var(--muted)'>Updating directory...</td></tr>";

        // Building query with status filter included
        fetch(`/api/mentor/students?academicYear=${year}&department=${dept}&status=${status}`,{
            credentials:"include"
        })
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";
            
            if(data.length === 0) {
                table.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px; color:var(--muted)'>No mentees found matching those criteria.</td></tr>";
                return;
            }

            data.forEach(student => {
                const row = `
                <tr>
                    <td><div style="color:white; font-weight:600;">${student.name}</div></td>
                    <td><code style="color:var(--accent);">${student.usn}</code></td>
                    <td>${student.department}</td>
                    <td>Year ${student.academicYear}</td>
                    <td style="text-align: right; padding-right: 24px;">
                        <a href="mentor_viewstudent.html?usn=${student.usn}" class="btn-view">View Details</a>
                    </td>
                </tr>
                `;
                table.innerHTML += row;
            });
        })
        .catch(err => {
            console.error(err);
            table.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px; color:#f87171'>System error: Connection lost.</td></tr>";
        });
    }

    // Auto-load mentees on page entry
    window.onload = filterStudents;
</script>

</body>
</html>
