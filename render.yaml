services:
  - type: web
    name: mente-mentor-management
    runtime: java
    plan: free
    buildCommand: |
      cd SpringBoot--Student-Academic-Record-main && mvn clean package -DskipTests
    startCommand: |
      cd SpringBoot--Student-Academic-Record-main && java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
